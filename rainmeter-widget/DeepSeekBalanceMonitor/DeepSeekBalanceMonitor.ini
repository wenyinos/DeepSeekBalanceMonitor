[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
DefaultAlwaysOnTop=-2
DefaultDraggable=1
DefaultSavePosition=1
DefaultSnapEdges=1
DefaultKeepOnScreen=1

[Metadata]
Name=DeepSeek Balance Monitor
Author=DeepSeekBalanceMonitor
Information=Liquid-glass desktop widget prototype matching the KDE Plasma widget.
Version=1.2
License=MIT

[Variables]
DaemonStatusUrl=http://127.0.0.1:17654/widget-status?lang=zh
DaemonCheckUrl=http://127.0.0.1:17654/check?lang=zh
FallbackAccentColor=60,105,102
FallbackBalanceLine=⚠ 请打开原进程
FallbackStatusLine=未识别到本地数据
LabelLastCheck=🕐 上次查询
FallbackLastCheck=尚未查询
LabelService=📡 DeepSeek API 服务状态：
FallbackServiceStatusLine=⚪ 未连接
FallbackEstimatedLine=📊 等待数据
RefreshText=查询
WidgetW=324
WidgetH=164
FontFace=Microsoft YaHei UI
TextColor=255,255,255
TextShadow=0,0,0,180
GlassOpacity=30

[MeterShadow]
Meter=Shape
Shape=Rectangle 5,7,314,152,18 | Fill Color 0,0,0,72 | StrokeWidth 0
AntiAlias=1

[MeterGlass]
Meter=Shape
Shape=Rectangle 0,0,#WidgetW#,#WidgetH#,18 | Fill Color 18,20,24,#GlassOpacity# | Stroke Color 255,255,255,106 | StrokeWidth 1
DynamicVariables=1
AntiAlias=1

[MeterTintRight]
Meter=Shape
Shape=Ellipse 252,108,82,82 | Fill Color 120,180,170,28 | StrokeWidth 0
AntiAlias=1

[MeterTopHighlight]
Meter=Shape
Shape=Rectangle 14,14,296,1,1 | Fill Color 255,255,255,108 | StrokeWidth 0
AntiAlias=1

[MeasureDaemon]
Measure=WebParser
URL=#DaemonStatusUrl#
UpdateRate=5
RegExp=(?si).*"accent_color"\s*:\s*"([^"]*)".*"balance_line"\s*:\s*"([^"]*)".*"status_line"\s*:\s*"([^"]*)".*"last_check"\s*:\s*"([^"]*)".*"service_status_line"\s*:\s*"([^"]*)".*"estimated_line"\s*:\s*"([^"]*)".*
FinishAction=[!SetOption MeterBalance Text "[*MeasureBalanceLine*]"][!SetOption MeterStatus Text "[*MeasureStatusLine*]"][!SetOption MeterLastValue Text "[*MeasureLastCheck*]"][!SetOption MeterServiceValue Text "[*MeasureServiceStatusLine*]"][!SetOption MeterEstimated Text "[*MeasureEstimatedLine*]"][!UpdateMeter *][!Redraw]
OnConnectErrorAction=[!CommandMeasure MeasureDaemon "Reset"][!SetOption MeterBalance Text "#FallbackBalanceLine#"][!SetOption MeterStatus Text "#FallbackStatusLine#"][!SetOption MeterLastValue Text "#FallbackLastCheck#"][!SetOption MeterServiceValue Text "#FallbackServiceStatusLine#"][!SetOption MeterEstimated Text "#FallbackEstimatedLine#"][!UpdateMeter *][!Redraw]
OnRegExpErrorAction=[!CommandMeasure MeasureDaemon "Reset"][!SetOption MeterBalance Text "#FallbackBalanceLine#"][!SetOption MeterStatus Text "#FallbackStatusLine#"][!SetOption MeterLastValue Text "#FallbackLastCheck#"][!SetOption MeterServiceValue Text "#FallbackServiceStatusLine#"][!SetOption MeterEstimated Text "#FallbackEstimatedLine#"][!UpdateMeter *][!Redraw]
DynamicVariables=1

[MeasureAccentColor]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=1
Substitute="":"#FallbackAccentColor#"

[MeasureBalanceLine]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=2
Substitute="":"#FallbackBalanceLine#"

[MeasureStatusLine]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=3
Substitute="":"#FallbackStatusLine#"

[MeasureLastCheck]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=4
Substitute="":"#FallbackLastCheck#"

[MeasureServiceStatusLine]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=5
Substitute="":"#FallbackServiceStatusLine#"

[MeasureEstimatedLine]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=6
Substitute="":"#FallbackEstimatedLine#"

[MeasureTriggerCheck]
Measure=WebParser
URL=#DaemonCheckUrl#
Disabled=1
RegExp=(?si).*
FinishAction=[!DisableMeasure MeasureTriggerCheck][!CommandMeasure MeasureDaemon "Update"]
DynamicVariables=1

[MeterLogo]
Meter=Image
ImageName=#@#Images\deepseek-balance-monitor.png
X=20
Y=20
W=40
H=40
PreserveAspectRatio=1

[MeterBalance]
Meter=String
Text=#FallbackBalanceLine#
X=76
Y=15
W=172
H=34
FontFace=#FontFace#
FontSize=15
FontWeight=700
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterRefreshBg]
Meter=Shape
Shape=Rectangle 256,22,52,28,14 | Fill Color 255,255,255,36 | Stroke Color 255,255,255,118 | StrokeWidth 1
AntiAlias=1
LeftMouseUpAction=[!EnableMeasure MeasureTriggerCheck][!CommandMeasure MeasureTriggerCheck "Update"]

[MeterRefresh]
Meter=String
Text=#RefreshText#
X=282
Y=25
W=52
H=22
FontFace=#FontFace#
FontSize=10
FontWeight=700
FontColor=#TextColor#
StringAlign=Center
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
LeftMouseUpAction=[!EnableMeasure MeasureTriggerCheck][!CommandMeasure MeasureTriggerCheck "Update"]
DynamicVariables=1

[MeterStatus]
Meter=String
Text=#FallbackStatusLine#
X=18
Y=68
W=288
H=22
FontFace=#FontFace#
FontSize=11
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterLastLabel]
Meter=String
Text=#LabelLastCheck#
X=18
Y=92
W=96
H=18
FontFace=#FontFace#
FontSize=10
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
DynamicVariables=1

[MeterLastValue]
Meter=String
Text=#FallbackLastCheck#
X=130
Y=92
W=176
H=18
FontFace=#FontFace#
FontSize=10
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterServiceLabel]
Meter=String
Text=#LabelService#
X=18
Y=114
W=156
H=18
FontFace=#FontFace#
FontSize=10
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterServiceValue]
Meter=String
Text=#FallbackServiceStatusLine#
X=180
Y=114
W=126
H=18
FontFace=#FontFace#
FontSize=10
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterEstimated]
Meter=String
Text=#FallbackEstimatedLine#
X=18
Y=136
W=288
H=22
FontFace=#FontFace#
FontSize=13
FontWeight=700
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1
