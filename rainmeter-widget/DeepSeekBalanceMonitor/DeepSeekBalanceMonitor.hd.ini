[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
DefaultAlwaysOnTop=-2
DefaultDraggable=1
DefaultSavePosition=1
DefaultSnapEdges=1
DefaultKeepOnScreen=1

[Metadata]
Name=DeepSeek Balance Monitor (HD)
Author=DeepSeekBalanceMonitor
Information=2x version for high-DPI screens.
Version=1.2
License=MIT

[Variables]
DaemonStatusUrl=http://127.0.0.1:17654/widget-status?lang=zh
DaemonCheckUrl=http://127.0.0.1:17654/check?lang=zh
FallbackAccentColor=60,105,102
FallbackBalanceLine=⚠ 请打开原进程
FallbackStatusLine=未识别到本地数据
LabelLastCheck=🕐 上次查询：
FallbackLastCheck=尚未查询
LabelService=📡 API 服务状态：
FallbackServiceStatusLine=未连接
FallbackEstimatedLine=📊 等待数据
RefreshText=查询
WidgetW=648
WidgetH=276
FontFace=Microsoft YaHei UI
TextColor=255,255,255
TextShadow=0,0,0,180
GlassOpacity=30

[MeterShadow]
Meter=Shape
Shape=Rectangle 12,12,624,252,36 | Fill Color 0,0,0,72 | StrokeWidth 0
AntiAlias=1

[MeterGlass]
Meter=Shape
Shape=Rectangle 0,0,#WidgetW#,#WidgetH#,40 | Fill Color 18,20,24,#GlassOpacity# | Stroke Color 255,255,255,106 | StrokeWidth 2
DynamicVariables=1
AntiAlias=1

[MeterTopHighlight]
Meter=Shape
Shape=Rectangle 28,188,592,1,1 | Fill Color 255,255,255,40 | StrokeWidth 0
AntiAlias=1

[MeasureDaemon]
Measure=WebParser
URL=#DaemonStatusUrl#
UpdateRate=5
RegExp=(?si).*"accent_color"\s*:\s*"([^"]*)".*"balance_line"\s*:\s*"([^"]*)".*"status_line"\s*:\s*"([^"]*)".*"last_check"\s*:\s*"([^"]*)".*"service_status_line"\s*:\s*"([^"]*)".*"estimated_line"\s*:\s*"([^"]*)".*
FinishAction=[!SetOption MeterBalance Text "[*MeasureBalanceLine*]"][!SetOption MeterLastValue Text "[*MeasureLastCheck*]"][!SetOption MeterServiceValue Text "[*MeasureServiceStatusLine*]"][!SetOption MeterEstimated Text "[*MeasureEstimatedLine*]"][!UpdateMeter *][!Redraw]
OnConnectErrorAction=[!CommandMeasure MeasureDaemon "Reset"][!SetOption MeterBalance Text "#FallbackBalanceLine#"][!SetOption MeterLastValue Text "#FallbackLastCheck#"][!SetOption MeterServiceValue Text "#FallbackServiceStatusLine#"][!SetOption MeterEstimated Text "#FallbackEstimatedLine#"][!UpdateMeter *][!Redraw]
OnRegExpErrorAction=[!CommandMeasure MeasureDaemon "Reset"][!SetOption MeterBalance Text "#FallbackBalanceLine#"][!SetOption MeterLastValue Text "#FallbackLastCheck#"][!SetOption MeterServiceValue Text "#FallbackServiceStatusLine#"][!SetOption MeterEstimated Text "#FallbackEstimatedLine#"][!UpdateMeter *][!Redraw]
DynamicVariables=1

[MeasureAccentColor]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=1
Substitute="":"#FallbackAccentColor#"

[MeasureBalanceLine]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=2
Substitute="":"#FallbackBalanceLine#"

[MeasureLastCheck]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=4
Substitute="":"#FallbackLastCheck#"

[MeasureServiceStatusLine]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=5
Substitute="":"#FallbackServiceStatusLine#"

[MeasureEstimatedLine]
Measure=WebParser
URL=[MeasureDaemon]
StringIndex=6
Substitute="":"#FallbackEstimatedLine#"

[MeasureTriggerCheck]
Measure=WebParser
URL=#DaemonCheckUrl#
Disabled=1
RegExp=(?si).*
FinishAction=[!DisableMeasure MeasureTriggerCheck][!CommandMeasure MeasureDaemon "Update"]
DynamicVariables=1

[MeterLogoShadow]
Meter=Image
ImageName=#@#Images\deepseek-white.png
X=42
Y=17
W=80
H=80
PreserveAspectRatio=1
Greyscale=1
ImageTint=0,0,0,180
ImageAlpha=120

[MeterLogo]
Meter=Image
ImageName=#@#Images\deepseek-white.png
X=40
Y=15
W=80
H=80
PreserveAspectRatio=1

[MeterBalance]
Meter=String
Text=#FallbackBalanceLine#
X=152
Y=30
W=344
H=68
FontFace=#FontFace#
FontSize=30
FontWeight=700
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterRefreshBg]
Meter=Shape
Shape=Rectangle 512,32,104,48,24 | Fill Color 255,255,255,36 | Stroke Color 255,255,255,118 | StrokeWidth 2
AntiAlias=1
LeftMouseUpAction=[!EnableMeasure MeasureTriggerCheck][!CommandMeasure MeasureTriggerCheck "Update"]

[MeterRefresh]
Meter=String
Text=#RefreshText#
X=564
Y=38
W=104
H=44
FontFace=#FontFace#
FontSize=20
FontWeight=700
FontColor=#TextColor#
StringAlign=Center
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
LeftMouseUpAction=[!EnableMeasure MeasureTriggerCheck][!CommandMeasure MeasureTriggerCheck "Update"]
DynamicVariables=1

[MeterLastLabel]
Meter=String
Text=#LabelLastCheck#
X=36
Y=100
W=192
H=36
FontFace=#FontFace#
FontSize=20
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
DynamicVariables=1

[MeterLastValue]
Meter=String
Text=#FallbackLastCheck#
X=360
Y=102
W=252
H=36
FontFace=#FontFace#
FontSize=20
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterServiceLabel]
Meter=String
Text=#LabelService#
X=36
Y=144
W=312
H=36
FontFace=#FontFace#
FontSize=20
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterServiceValue]
Meter=String
Text=#FallbackServiceStatusLine#
X=360
Y=144
W=252
H=36
FontFace=#FontFace#
FontSize=20
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterEstimated]
Meter=String
Text=#FallbackEstimatedLine#
X=36
Y=200
W=576
H=44
FontFace=#FontFace#
FontSize=26
FontWeight=700
FontColor=#TextColor#
StringEffect=Shadow
FontEffectColor=#TextShadow#
AntiAlias=1
ClipString=1
DynamicVariables=1
