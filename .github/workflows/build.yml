name: Build

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["v[0-9]*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: pip install cryptography

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pystray Pillow cryptography pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --noconsole `
            --name DeepSeekBalanceMonitor `
            --icon assets/app.ico `
            --paths src `
            --add-data "assets/app.ico`;." `
            --version-file scripts/version_info.txt `
            --clean `
            --log-level INFO `
            main.py

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:GITHUB_REF_NAME dist/DeepSeekBalanceMonitor.exe --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $env:GITHUB_REF_NAME dist/DeepSeekBalanceMonitor.exe --title $env:GITHUB_REF_NAME --notes "Python build." --repo $env:GITHUB_REPOSITORY
          }
