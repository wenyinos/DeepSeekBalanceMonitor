name: Rust Windows

on:
  push:
    branches:
      - "main"
      - "Rust-Dev"
    tags:
      - "rust-v[0-9]*"
    paths:
      - "rust-windows/**"
      - ".github/workflows/rust-windows.yml"
  pull_request:
    paths:
      - "rust-windows/**"
      - ".github/workflows/rust-windows.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
    defaults:
      run:
        working-directory: rust-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.77.2
        run: |
          rustup toolchain install 1.77.2 --profile minimal --component rustfmt
          rustup target add x86_64-pc-windows-msvc i686-pc-windows-msvc --toolchain 1.77.2

      - name: Check formatting
        run: cargo +1.77.2 fmt --check

      - name: Check Windows targets
        run: |
          cargo +1.77.2 check --target x86_64-pc-windows-msvc --locked
          cargo +1.77.2 check --target i686-pc-windows-msvc --locked

      - name: Run unit tests
        run: cargo +1.77.2 test --locked

      - name: Build release executables
        run: |
          cargo +1.77.2 build --release --target x86_64-pc-windows-msvc --locked
          cargo +1.77.2 build --release --target i686-pc-windows-msvc --locked

      - name: Create versioned executables
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          if ($version.StartsWith("rust-v")) {
            $version = $version.Substring(6)
          } else {
            $version = ((cargo +1.77.2 pkgid) -split "@")[-1]
            if ($version.EndsWith(".0")) {
              $version = $version.Substring(0, $version.Length - 2)
            }
          }
          $targets = @(
            @{ Triple = "x86_64-pc-windows-msvc"; Arch = "x86_64" },
            @{ Triple = "i686-pc-windows-msvc"; Arch = "i686" }
          )
          foreach ($target in $targets) {
            $asset = "target/$($target.Triple)/release/deepseek-balance-monitor-${version}-windows-$($target.Arch).exe"
            Copy-Item "target/$($target.Triple)/release/deepseek-balance-monitor.exe" $asset
          }

      - name: Sign Windows executables
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_TRUSTED_SIGNING_ENDPOINT != '' && env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME != '' && env.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME != '' }}
        uses: azure/trusted-signing-action@v0
        with:
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\rust-windows\target
          files-folder-filter: deepseek-balance-monitor-*-windows-*.exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-balance-monitor-windows
          path: rust-windows/target/*-pc-windows-msvc/release/deepseek-balance-monitor-*-windows-*.exe

      - name: Prepare release metadata
        if: startsWith(github.ref, 'refs/tags/rust-v')
        id: release_metadata
        run: |
          $version = "${env:GITHUB_REF_NAME}".Substring(6)
          Add-Content -Path "${env:GITHUB_OUTPUT}" -Value "release_name=v$version"

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/rust-v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_metadata.outputs.release_name }}
          files: rust-windows/target/*-pc-windows-msvc/release/deepseek-balance-monitor-*-windows-*.exe
          body: |
            ## Rust builds
            - Windows: native x86_64 and i686 executables.
            - Linux: x86_64 CLI daemon package with systemd user service and KDE Plasma widget.
            - Rainmeter: Windows desktop widget skin package.
          generate_release_notes: true
          overwrite_files: true
